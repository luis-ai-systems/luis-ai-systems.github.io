    <canvas id="acgCanvas"></canvas>
    
    <!-- UI Overlay -->
    <div class="cyber-overlay-ui">
        <h2>『 自动排版·绝对避让矩阵 』</h2>
        <p>Pretext Concept / 拖拽发光节点，观察跳线与字母的重力避让</p>
        <a href="https://github.com/chenglou/pretext" target="_blank" class="cyber-btn-small">
            Insp. by Chenglou/Pretext <span class="octicon octicon-link-external"></span>
        </a>
    </div>
</div>

<style>
/* Override default layout padding */
.container {
    max-width: 100% !important;
    padding: 0 !important;
}
body {
    overflow: hidden; /* Prevent scrolling while dragging */
}

.acg-physics-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    margin-top: -60px; /* Offset header */
    background: #050508;
    overflow: hidden;
}

/* Glassmorphism UI */
.cyber-overlay-ui {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 25, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 229, 255, 0.3);
    border-radius: 12px;
    padding: 20px 40px;
    text-align: center;
    pointer-events: none; /* Let clicks pass through to canvas */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(124, 77, 255, 0.2);
    z-index: 10;
}

.cyber-overlay-ui h2 {
    margin: 0 0 10px 0;
    font-size: 1.5rem;
    background: linear-gradient(90deg, #00e5ff, #7c4dff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
}

.cyber-overlay-ui p {
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.9rem;
    margin-bottom: 15px;
}

.cyber-btn-small {
    pointer-events: auto; /* Re-enable clicks for the button */
    display: inline-block;
    padding: 8px 16px;
    background: rgba(124, 77, 255, 0.2);
    border: 1px solid rgba(124, 77, 255, 0.5);
    color: #fff !important;
    text-decoration: none;
    font-size: 0.8rem;
    border-radius: 20px;
    transition: all 0.3s;
}
.cyber-btn-small:hover {
    background: rgba(124, 77, 255, 0.6);
    box-shadow: 0 0 15px rgba(124, 77, 255, 0.5);
}

#acgCanvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none; /* Critical for trackpad drag */
    cursor: crosshair;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById("acgCanvas");
    const ctx = canvas.getContext("2d");
    
    let width, height;
    let particles = [];
    let nodes = [];
    
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン零一二三四五六七八九十界虚空神机同步律动";
    
    // Theme Awareness
    function isLightTheme() {
        return document.documentElement.classList.contains('light-theme');
    }
    
    function getThemeColors() {
        if (isLightTheme()) {
            return {
                bg: "rgba(248, 249, 252, 0.9)",
                text: ["rgba(26, 26, 46, 0.8)", "rgba(0, 102, 204, 0.7)", "rgba(98, 0, 238, 0.7)"],
                nodeGlow: "rgba(0, 102, 204, 0.3)",
                nodeCore: "rgba(98, 0, 238, 0.8)",
                nodeAlert: "#ff2a55",
                wire: "rgba(98, 0, 238, 0.5)"
            };
        } else {
            return {
                bg: "rgba(5, 5, 10, 0.9)",
                text: ["rgba(255, 255, 255, 0.8)", "rgba(0, 229, 255, 0.6)", "rgba(124, 77, 255, 0.7)"],
                nodeGlow: "rgba(0, 229, 255, 0.3)",
                nodeCore: "rgba(124, 77, 255, 0.8)",
                nodeAlert: "#00e5ff",
                wire: "rgba(124, 77, 255, 0.8)"
            };
        }
    }
    
    function resize() {
        let rect = canvas.parentElement.getBoundingClientRect();
        width = canvas.width = (rect.width > 0 ? rect.width : window.innerWidth) || 1200;
        height = canvas.height = (rect.height > 0 ? rect.height : window.innerHeight) || 800;
        
        if (nodes.length === 0) {
            nodes.push(new Node(width * 0.3, height * 0.4, "NODE-ALPHA"));
            nodes.push(new Node(width * 0.5, height * 0.6, "NEXUS-CORE"));
            nodes.push(new Node(width * 0.7, height * 0.3, "DATA-SINK"));
        } else {
            nodes[0].x = width * 0.3; nodes[0].y = height * 0.4;
            nodes[1].x = width * 0.5; nodes[1].y = height * 0.6;
            nodes[2].x = width * 0.7; nodes[2].y = height * 0.3;
        }
        initParticles();
    }
    window.addEventListener('resize', resize);
    
    class Node {
        constructor(x, y, label) {
            this.x = x;
            this.y = y;
            this.radius = 90; 
            this.coreRadius = 15;
            this.label = label;
            this.isDragging = false;
        }
        draw(ctx, theme) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = theme.nodeAlert;
            
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = theme.nodeGlow;
            if (ctx.setLineDash) ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.stroke();
            
            if (ctx.setLineDash) ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.coreRadius, 0, Math.PI * 2);
            ctx.fillStyle = this.isDragging ? theme.nodeAlert : theme.nodeCore;
            ctx.fill();
            ctx.strokeStyle = theme.nodeAlert;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = theme.nodeAlert;
            ctx.font = "bold 12px monospace";
            ctx.fillText(this.label, this.x + 25, this.y + 4);
        }
    }
    
    class Particle {
        constructor(x, y) {
            this.baseX = x;
            this.baseY = y;
            this.x = x;
            this.y = y;
            this.char = charset[Math.floor(Math.random() * charset.length)] || "X";
            this.colorIndex = Math.floor(Math.random() * 3);
            this.vx = 0;
            this.vy = 0;
            this.alarmed = false;
        }
        
        update(theme) {
            let dx = this.baseX - this.x;
            let dy = this.baseY - this.y;
            this.vx += dx * 0.08; 
            this.vy += dy * 0.08;
            
            this.alarmed = false;
            for(let i=0; i<nodes.length; i++) {
                let node = nodes[i];
                let distX = this.x - node.x;
                let distY = this.y - node.y;
                let dist = Math.sqrt(distX * distX + distY * distY) || 1;
                
                if (dist < node.radius) {
                    let force = (node.radius - dist) / node.radius;
                    // Strong push
                    this.vx += (distX / dist) * force * 10;
                    this.vy += (distY / dist) * force * 10;
                    this.alarmed = true;
                }
            }
            
            this.vx *= 0.7;
            this.vy *= 0.7;
            this.x += this.vx;
            this.y += this.vy;
        }
        
        draw(ctx, theme) {
            ctx.fillStyle = this.alarmed ? theme.nodeAlert : theme.text[this.colorIndex];
            ctx.fillText(this.char, this.x, this.y);
        }
    }
    
    function initParticles() {
        particles = [];
        const spacing = 22; 
        for (let y = 10; y < height; y += spacing) {
            for (let x = 10; x < width; x += spacing) {
                if(Math.random() > 0.2) {
                    particles.push(new Particle(x, y));
                }
            }
        }
    }
    
    let mouse = { x: 0, y: 0, isDown: false };
    let draggedNode = null;
    
    function getEventPos(e) {
        let rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        }
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function handleDown(e) {
        const pos = getEventPos(e);
        mouse.x = pos.x; mouse.y = pos.y; mouse.isDown = true;
        draggedNode = null;
        
        for (let i = nodes.length - 1; i >= 0; i--) {
            let dx = mouse.x - nodes[i].x;
            let dy = mouse.y - nodes[i].y;
            if (dx * dx + dy * dy < 2500) { 
                draggedNode = nodes[i];
                draggedNode.isDragging = true;
                break;
            }
        }
    }

    function handleMove(e) {
        if (!mouse.isDown) return;
        const pos = getEventPos(e);
        if (draggedNode) {
            if (e.cancelable) e.preventDefault(); 
            draggedNode.x = pos.x;
            draggedNode.y = pos.y;
        }
    }

    function handleUp(e) {
        mouse.isDown = false;
        if (draggedNode) {
            draggedNode.isDragging = false;
            draggedNode = null;
        }
    }
    
    canvas.addEventListener('mousedown', handleDown);
    window.addEventListener('mousemove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleUp);
    
    canvas.addEventListener('touchstart', handleDown, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleUp);
    
    // Observers to re-init particles if theme changes
    const observer = new MutationObserver(() => {
        // Just let the render loop pick up colors dynamically
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    
    function animate() {
        try {
            const theme = getThemeColors();
            ctx.clearRect(0, 0, width, height); 
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, width, height);
            
            // Draw jump wires
            ctx.shadowBlur = 10;
            ctx.shadowColor = theme.wire;
            ctx.strokeStyle = theme.wire;
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            for (let i = 0; i < nodes.length - 1; i++) {
                let current = nodes[i];
                let next = nodes[i + 1];
                ctx.moveTo(current.x, current.y);
                let cp1x = current.x + (next.x - current.x) / 2;
                let cp1y = current.y;
                let cp2x = current.x + (next.x - current.x) / 2;
                let cp2y = next.y;
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, next.x, next.y);
            }
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold 15px monospace";
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(theme);
                particles[i].draw(ctx, theme);
            }
            
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].draw(ctx, theme);
            }
        } catch(err) {
            ctx.fillStyle = "red";
            ctx.font = "16px Arial";
            ctx.fillText("Render Exception: " + err.message, width/2, height/2);
        }
        
        requestAnimationFrame(animate);
    }
    
    resize();
    animate();
});
</script>
