            Insp. by Chenglou/Pretext <span class="octicon octicon-link-external"></span>

    </div>
</div>

<style>
/* Override default layout padding */
.container {
    max-width: 100% !important;
    padding: 0 !important;
}
body {
    overflow: hidden; /* Prevent scrolling while dragging */
}

.acg-physics-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    margin-top: -60px; /* Offset header */
    background: #050508;
    overflow: hidden;
}

/* Glassmorphism UI */
.cyber-overlay-ui {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 25, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 229, 255, 0.3);
    border-radius: 12px;
    padding: 20px 40px;
    text-align: center;
    pointer-events: none; /* Let clicks pass through to canvas */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(124, 77, 255, 0.2);
    z-index: 10;
}

.cyber-overlay-ui h2 {
    margin: 0 0 10px 0;
    font-size: 1.5rem;
    background: linear-gradient(90deg, #00e5ff, #7c4dff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
}

.cyber-overlay-ui p {
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.9rem;
    margin-bottom: 15px;
}

.cyber-btn-small {
    pointer-events: auto; /* Re-enable clicks for the button */
    display: inline-block;
    padding: 8px 16px;
    background: rgba(124, 77, 255, 0.2);
    border: 1px solid rgba(124, 77, 255, 0.5);
    color: #fff !important;
    text-decoration: none;
    font-size: 0.8rem;
    border-radius: 20px;
    transition: all 0.3s;
}
.cyber-btn-small:hover {
    background: rgba(124, 77, 255, 0.6);
    box-shadow: 0 0 15px rgba(124, 77, 255, 0.5);
}

#acgCanvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none; /* Critical for trackpad drag */
    cursor: crosshair;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById("acgCanvas");
    const ctx = canvas.getContext("2d");
    
    let width, height;
    let particles = [];
    let nodes = [];
    
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン零一二三四五六七八九十界虚空神机同步律动";
    
    function resize() {
        // Fallback robust sizing
        let rect = canvas.parentElement.getBoundingClientRect();
        width = canvas.width = (rect.width > 0 ? rect.width : window.innerWidth) || 1200;
        height = canvas.height = (rect.height > 0 ? rect.height : window.innerHeight) || 800;
        
        if (nodes.length === 0) {
            nodes.push(new Node(width * 0.3, height * 0.4, "NODE-ALPHA"));
            nodes.push(new Node(width * 0.5, height * 0.6, "NEXUS-CORE"));
            nodes.push(new Node(width * 0.7, height * 0.3, "DATA-SINK"));
        } else {
            nodes[0].x = width * 0.3; nodes[0].y = height * 0.4;
            nodes[1].x = width * 0.5; nodes[1].y = height * 0.6;
            nodes[2].x = width * 0.7; nodes[2].y = height * 0.3;
        }
        initParticles();
    }
    window.addEventListener('resize', resize);
    
    class Node {
        constructor(x, y, label) {
            this.x = x;
            this.y = y;
            this.radius = 90; 
            this.coreRadius = 15;
            this.label = label;
            this.isDragging = false;
        }
        draw(ctx) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00e5ff";
            
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(0, 229, 255, 0.2)";
            if (ctx.setLineDash) ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.stroke();
            
            if (ctx.setLineDash) ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.coreRadius, 0, Math.PI * 2);
            ctx.fillStyle = this.isDragging ? "#fff" : "rgba(124, 77, 255, 0.8)";
            ctx.fill();
            ctx.strokeStyle = "#00e5ff";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#00e5ff";
            ctx.font = "12px monospace";
            ctx.fillText(this.label, this.x + 25, this.y + 4);
        }
    }
    
    class Particle {
        constructor(x, y) {
            this.baseX = x;
            this.baseY = y;
            this.x = x;
            this.y = y;
            let cIndex = Math.floor(Math.random() * charset.length);
            this.char = charset[cIndex] || "X";
            
            const colorList = ["rgba(255, 255, 255, 0.8)", "rgba(0, 229, 255, 0.6)", "rgba(124, 77, 255, 0.7)"];
            this.color = colorList[Math.floor(Math.random() * colorList.length)];
            this.vx = 0;
            this.vy = 0;
            this.currentColor = this.color;
        }
        
        update() {
            let dx = this.baseX - this.x;
            let dy = this.baseY - this.y;
            this.vx += dx * 0.08; 
            this.vy += dy * 0.08;
            
            let alarmed = false;
            for(let i=0; i<nodes.length; i++) {
                let node = nodes[i];
                let distX = this.x - node.x;
                let distY = this.y - node.y;
                let dist = Math.sqrt(distX * distX + distY * distY) || 1;
                
                if (dist < node.radius) {
                    let force = (node.radius - dist) / node.radius;
                    // Ensure strong push
                    this.vx += (distX / dist) * force * 10;
                    this.vy += (distY / dist) * force * 10;
                    alarmed = true;
                }
            }
            
            this.currentColor = alarmed ? "#00e5ff" : this.color;
            this.vx *= 0.7;
            this.vy *= 0.7;
            this.x += this.vx;
            this.y += this.vy;
        }
        
        draw(ctx) {
            ctx.fillStyle = this.currentColor;
            ctx.fillText(this.char, this.x, this.y);
        }
    }
    
    function initParticles() {
        particles = [];
        const spacing = 22; 
        for (let y = 10; y < height; y += spacing) {
            for (let x = 10; x < width; x += spacing) {
                // Populate heavily to ensure visibility
                if(Math.random() > 0.2) {
                    particles.push(new Particle(x, y));
                }
            }
        }
    }
    
    let mouse = { x: 0, y: 0, isDown: false };
    let draggedNode = null;
    
    function getEventPos(e) {
        let rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        }
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function handleDown(e) {
        const pos = getEventPos(e);
        mouse.x = pos.x; mouse.y = pos.y; mouse.isDown = true;
        draggedNode = null;
        
        for (let i = nodes.length - 1; i >= 0; i--) {
            let dx = mouse.x - nodes[i].x;
            let dy = mouse.y - nodes[i].y;
            if (dx * dx + dy * dy < 2500) { // Large click radius for trackpads
                draggedNode = nodes[i];
                draggedNode.isDragging = true;
                break;
            }
        }
    }

    function handleMove(e) {
        if (!mouse.isDown) return;
        const pos = getEventPos(e);
        if (draggedNode) {
            if (e.cancelable) e.preventDefault(); // Stop scrolling while dragging
            draggedNode.x = pos.x;
            draggedNode.y = pos.y;
        }
    }

    function handleUp(e) {
        mouse.isDown = false;
        if (draggedNode) {
            draggedNode.isDragging = false;
            draggedNode = null;
        }
    }
    
    // Add multiple event types to ensure capture
    canvas.addEventListener('mousedown', handleDown);
    window.addEventListener('mousemove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleUp);
    
    canvas.addEventListener('touchstart', handleDown, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleUp);
    
    function animate() {
        try {
            ctx.clearRect(0, 0, width, height); // Fallback sweep
            ctx.fillStyle = "rgba(5, 5, 10, 0.9)";
            ctx.fillRect(0, 0, width, height);
            
            // Draw jump wires
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#7c4dff";
            ctx.strokeStyle = "rgba(124, 77, 255, 0.8)";
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            for (let i = 0; i < nodes.length - 1; i++) {
                let current = nodes[i];
                let next = nodes[i + 1];
                ctx.moveTo(current.x, current.y);
                let cp1x = current.x + (next.x - current.x) / 2;
                let cp1y = current.y;
                let cp2x = current.x + (next.x - current.x) / 2;
                let cp2y = next.y;
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, next.x, next.y);
            }
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold 15px monospace"; // Bolder text
            
            // Draw particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw(ctx);
            }
            
            // Draw nodes
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].draw(ctx);
            }
        } catch(err) {
            ctx.fillStyle = "red";
            ctx.font = "16px Arial";
            ctx.fillText("Render Exception: " + err.message, width/2, height/2);
        }
        
        requestAnimationFrame(animate);
    }
    
    resize();
    animate();
});
</script>
