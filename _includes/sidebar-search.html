
<h3>Search</h3>
<div id="site_search">
    <input type="text" id="search_box" placeholder="🔍 搜索文章...">
</div>

<ul id="search_results" style="list-style-type:none;padding:10px 0 0 0;margin:0;"></ul>

<script src="{{ assets_base_url }}/assets/js/simple-jekyll-search.min.js"></script>

<script type="text/javascript">
SimpleJekyllSearch({
    searchInput: document.getElementById('search_box'),
    resultsContainer: document.getElementById('search_results'),
  {% if site.cdn.jsdelivr.enabled and site.url contains 'luis-ai-systems.github.io' %}
    json: 'https://fastly.jsdelivr.net/gh/luis-ai-systems/luis-ai-systems.github.io@built/assets/search_data.json?v={{ "now" | date: "%s"}}',
  {% else %}
    json: '{{ site.url }}/assets/search_data.json?v={{ "now" | date: "%s"}}',
  {% endif %}
    searchResultTemplate: '<li style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);"><a href="{url}" title="{title}" style="font-size:0.9rem;font-weight:500;">{title}</a></li>',
    noResultsText: '<li style="color:rgba(255,255,255,0.3);padding:8px 0;font-size:0.85rem;">没有找到结果</li>',
    limit: {{ site.simple_jekyll_search.limit }},
    fuzzy: false,
    exclude: ['Welcome']
})
</script>
